# Cloud Build — Build et push image pour Cloud Run
# Usage: gcloud builds submit --config=cloudbuild.yaml
# Prérequis: gcloud auth configure-docker europe-west1-docker.pkg.dev

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "europe-west1-docker.pkg.dev/${PROJECT_ID}/clearborder/api:${SHORT_SHA}"
      - "-t"
      - "europe-west1-docker.pkg.dev/${PROJECT_ID}/clearborder/api:latest"
      - "."
    dir: "clearborder"
    id: "build"

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "europe-west1-docker.pkg.dev/${PROJECT_ID}/clearborder/api"]
    id: "push"
    waitFor: ["build"]

images:
  - "europe-west1-docker.pkg.dev/${PROJECT_ID}/clearborder/api:${SHORT_SHA}"
  - "europe-west1-docker.pkg.dev/${PROJECT_ID}/clearborder/api:latest"

options:
  logging: CLOUD_LOGGING_ONLY
